services:
  pbsmt-train:
    build:
      context: .
      dockerfile: docker/pbsmt-local/Dockerfile
    user: "1000:1000"
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      DATA_DIR: /workspace/data
      REPORTS_DIR: /workspace/reports
      NEWS_PAIRS: "60000"
      EUROPARL_PAIRS: "40000"
      TATOEBA_PAIRS: "20000"
      TRAIN_PAIRS: "116000"
      VALID_PAIRS: "2000"
      TEST_PAIRS: "2000"
      MAX_SENTENCE_LENGTH: "50"
      MAX_PHRASE_LENGTH: "5"
      THREADS: "16"
      TUNING_MAX_ITERATIONS: "2"
      TUNING_DECODER_THREADS: "4"
      TUNING_MERT_THREADS: "16"
      EVAL_DECODER_THREADS: "8"
    command: ["bash", "-lc", "bash scripts/train_local_pbsmt.sh && bash scripts/update_repo_models.sh"]

  streamlit-app:
    build:
      context: .
      dockerfile: docker/pbsmt-local/Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      PBSMT_MODELS_ROOT: /workspace/models
      MOSES_BIN: /opt/pbsmt/tools/mosesdecoder/bin/moses
      PBSMT_DECODER_THREADS: "2"
    ports:
      - "8501:8501"
    command: ["bash", "-lc", "python3 -m pip install -q -r requirements-streamlit.txt && streamlit run app.py --server.address 0.0.0.0 --server.port 8501"]
